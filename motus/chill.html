<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2540">
  <title>Motus chill — Partie en cours</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="app-header-home" title="Retour au choix du mode">←</a>
    <h1>🟧 Motus chill</h1>
    <span class="header-info" id="server-status">connexion au serveur…</span>
  </header>

  <main>

    <!-- VUE 1 : CONFIG -->
    <div class="card view" id="view-config">
      <h2>Options de la partie</h2>
      <p class="subtitle">
        Mode chill : tu tapes les essais seul, les viewers proposent à l'oral
        ou dans le tchat. Aucun joueur supplémentaire à attendre.
      </p>

      <div class="alert alert-error" id="error-box"></div>

      <div class="form-row">
        <div class="form-group">
          <label for="word-length-input">Longueur du mot</label>
          <input type="number" id="word-length-input" value="7" min="5" max="10" step="1">
          <p class="info-line">de 5 à 10 lettres</p>
        </div>
        <div class="form-group">
          <label for="max-attempts-input">Nombre d'essais</label>
          <input type="number" id="max-attempts-input" value="6" min="4" max="8" step="1">
          <p class="info-line">de 4 à 8 essais</p>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="start-btn">
        Lancer la partie
      </button>
    </div>

    <!-- VUE 2 : JEU EN COURS -->
    <div class="card view view-wide" id="view-in-game" style="display: none;">
      <div class="motus-header">
        <span class="motus-status-line" id="motus-status">Essai 1 / 6</span>
        <span class="motus-word-info" id="motus-word-info">7 lettres</span>
      </div>
      <div class="motus-grid" id="motus-grid"></div>
      <div class="motus-keyboard" id="motus-keyboard"></div>
    </div>

    <!-- VUE 3 : FIN DE MOT (entre les mots) -->
    <div class="card view" id="view-between" style="display: none;">
      <div class="between-summary" id="between-summary"></div>
      <div class="between-word" id="between-word"></div>
      <div class="between-actions">
        <button class="btn btn-primary btn-block" id="next-word-btn">Mot suivant</button>
        <button class="btn btn-secondary btn-block" id="back-to-config-btn">Changer les options</button>
      </div>
    </div>

  </main>

  <div class="toast-container" id="toast-container"></div>

  <footer class="app-footer">
    <a href="regles.html">Règles du jeu</a>
    <span class="footer-sep">·</span>
    <a href="../petitbac/mentions.html">Mentions légales</a>
  </footer>

  <script type="module" src="js/chill.js"></script>
</body>
</html>
