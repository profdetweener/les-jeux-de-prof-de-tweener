# Worker dedie aux "Jeux du Prof de Tweener".
name = "tweener-jeux"
main = "src/index.ts"
compatibility_date = "2025-05-01"

# ===========================================
# Durable Objects
# ===========================================
# PetitBacRoom : une instance par room de Petit Bac.
# MotusRoom    : une instance par room de Motus.
# Namespaces separes -> pas de collision de codes entre jeux.

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "PetitBacRoom"

[[durable_objects.bindings]]
name = "MOTUS_ROOMS"
class_name = "MotusRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PetitBacRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["MotusRoom"]
