# Worker dedie aux "Jeux du Prof de Tweener".
name = "tweener-jeux"
main = "src/index.ts"
compatibility_date = "2025-05-01"

# ===========================================
# Durable Objects
# ===========================================
# PetitBacRoom : une instance par room de Petit Bac.
# MotusRoom    : une instance par room de Motus.
# Namespaces separes -> pas de collision de codes entre jeux.

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "PetitBacRoom"

[[durable_objects.bindings]]
name = "MOTUS_ROOMS"
class_name = "MotusRoom"

[[durable_objects.bindings]]
name = "DEFINITION_ROOMS"
class_name = "DefinitionRoom"

# Singleton d'agregation des votes de difficulte (jeu Definitions).
# Une seule instance, adressee par idFromName("global").
[[durable_objects.bindings]]
name = "DEFINITION_VOTES"
class_name = "DefinitionVotes"

[[durable_objects.bindings]]
name = "SLIDE_ROOMS"
class_name = "SlideRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PetitBacRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["MotusRoom"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["DefinitionRoom"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["DefinitionVotes"]

[[migrations]]
tag = "v5"
new_sqlite_classes = ["SlideRoom"]
