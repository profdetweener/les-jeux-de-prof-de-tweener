<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2540">
  <title>Slide chill</title>
  <link rel="stylesheet" href="../shared/css/landing.css">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <header class="landing-header">
    <a href="index.html" class="app-header-home" title="Retour au choix du mode">←</a>
    <h1>Slide chill</h1>
    <span class="header-tagline">décale, colle, encaisse</span>
  </header>

  <main class="slide-main">

    <section class="setup-card" id="setup">
      <h2>Paramètres de la partie</h2>
      <div class="setup-row">
        <span class="setup-label">Taille de grille</span>
        <div class="seg" id="sizeSeg">
          <button data-n="4">4×4</button>
          <button data-n="5" class="on">5×5</button>
          <button data-n="6">6×6</button>
        </div>
      </div>
      <div class="setup-row">
        <span class="setup-label">Objectif</span>
        <div class="seg" id="targetSeg">
          <button data-t="30">30 pts</button>
          <button data-t="50" class="on">50 pts</button>
          <button data-t="80">80 pts</button>
        </div>
      </div>
      <button class="btn btn-primary" id="launchBtn">Lancer la partie</button>
    </section>

    <section id="game" hidden>
      <div class="hud">
        <div class="box"><div class="lbl">Score</div><div class="num" id="score">0</div></div>
        <div class="box"><div class="lbl">Objectif</div><div class="num goal" id="goal">50</div></div>
        <div class="box"><div class="lbl">Tours</div><div class="num" id="turns">0</div></div>
      </div>

      <div class="frame" id="frame"></div>

      <div class="river-lbl">Rivière, choisis une carte</div>
      <div class="river" id="river"></div>

      <div class="status" id="status"></div>
      <div class="btns">
        <button class="btn btn-primary" id="endTurn" style="display:none">Terminer le tour</button>
        <button class="btn btn-ghost" id="reset">Rejouer</button>
        <button class="btn btn-ghost" id="backSetup">Changer les options</button>
      </div>
    </section>

  </main>

  <div class="toast" id="toast"></div>

  <footer class="app-footer">
    <a href="regles.html">Règles du jeu</a>
    <span class="footer-sep">·</span>
    <a href="../petitbac/mentions.html">Mentions légales</a>
    <span class="footer-sep">·</span>
    <a href="https://www.twitch.tv/prof_de_tweener" target="_blank" rel="noopener">🟣 Twitch</a>
    <span class="footer-sep">·</span>
    <a href="https://buymeacoffee.com/profdetweener" target="_blank" rel="noopener">☕ Soutenir</a>
  </footer>

  <script src="js/game.js?v=2"></script>
</body>
</html>
