<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2540">
  <title>Slide compétitif</title>
  <link rel="stylesheet" href="../shared/css/landing.css">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <header class="landing-header">
    <a href="index.html" class="app-header-home" title="Retour au choix du mode">←</a>
    <h1>Slide compétitif</h1>
    <span class="header-tagline" id="roomCodeTag"></span>
  </header>

  <main class="slide-main">
    <div class="conn-banner" id="conn" hidden></div>

    <!-- LOBBY -->
    <section id="lobby" hidden>
      <div class="setup-card">
        <h2>Salon</h2>
        <p class="room-code-line">Code : <strong id="roomCode"></strong> <button class="mini-btn" id="copyBtn">copier</button></p>
        <div class="players" id="lobbyPlayers"></div>

        <div id="hostControls" hidden>
          <div class="setup-row">
            <span class="setup-label">Taille de grille</span>
            <div class="seg" id="sizeSeg">
              <button data-n="4">4×4</button>
              <button data-n="5" class="on">5×5</button>
              <button data-n="6">6×6</button>
            </div>
          </div>
          <div class="setup-row">
            <span class="setup-label">Objectif</span>
            <div class="seg" id="targetSeg">
              <button data-t="30">30</button>
              <button data-t="50" class="on">50</button>
              <button data-t="80">80</button>
            </div>
          </div>
          <button class="btn btn-primary" id="startBtn" style="width:100%">Lancer la partie</button>
          <p class="setup-err" id="startErr"></p>
        </div>
        <p class="wait-note" id="waitNote" hidden>En attente que l'hôte lance la partie…</p>
      </div>
    </section>

    <!-- JEU -->
    <section id="game" hidden>
      <div class="turn-banner" id="turnBanner"></div>
      <div class="players scores" id="scorePanel"></div>
      <div class="frame" id="frame"></div>
      <div class="river-lbl">Rivière</div>
      <div class="river" id="river"></div>
      <div class="status" id="status"></div>
      <div class="btns">
        <button class="btn btn-primary" id="endTurn" style="display:none">Terminer le tour</button>
      </div>
    </section>

    <!-- FIN -->
    <section id="finished" hidden>
      <div class="setup-card">
        <h2 id="winTitle"></h2>
        <div class="players" id="ranking"></div>
        <button class="btn btn-primary" id="lobbyBtn" style="width:100%" hidden>Retour au salon</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <a href="regles.html">Règles du jeu</a>
    <span class="footer-sep">·</span>
    <a href="../petitbac/mentions.html">Mentions légales</a>
    <span class="footer-sep">·</span>
    <a href="https://www.twitch.tv/prof_de_tweener" target="_blank" rel="noopener">🟣 Twitch</a>
    <span class="footer-sep">·</span>
    <a href="https://buymeacoffee.com/profdetweener" target="_blank" rel="noopener">☕ Soutenir</a>
  </footer>

  <script type="module" src="js/room.js"></script>
</body>
</html>
