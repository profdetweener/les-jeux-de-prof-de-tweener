<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2540">
  <title>Slide compétitif</title>
  <link rel="stylesheet" href="../shared/css/landing.css?v=4">
  <link rel="stylesheet" href="css/style.css?v=11">
</head>
<body>
  <header class="landing-header">
    <a href="index.html" class="app-header-home" title="Retour au choix du mode">←</a>
    <h1>Slide compétitif</h1>
    <span class="header-tagline" id="roomCodeTag"></span>
  </header>

  <main class="room-main">
    <div class="conn-banner" id="conn" hidden></div>

    <!-- LOBBY : carte large façon Sésame -->
    <section id="lobby" hidden>
      <div class="lobby-card">
        <div class="room-code-banner">
          <span class="label">Lien d'invitation</span>
          <div class="room-share">
            <code class="invite-url" id="inviteUrl" title="Lien d'invitation">-</code>
            <button type="button" class="copy-btn" id="copyBtn">Copier le lien</button>
          </div>
        </div>

        <div class="lobby-grid">
          <div class="lobby-players">
            <h3><span id="playerCount">0</span> joueurs</h3>
            <div class="players" id="lobbyPlayers"></div>
          </div>

          <div class="lobby-config">
            <h3>Configuration</h3>

            <div id="hostControls" hidden>
              <div class="setup-row">
                <span class="setup-label">Taille de grille</span>
                <div class="seg" id="sizeSeg">
                  <button data-n="4">4×4</button>
                  <button data-n="5" class="on">5×5</button>
                  <button data-n="6">6×6</button>
                  <button data-n="7">7×7</button>
                </div>
              </div>
              <div class="setup-row">
                <span class="setup-label">Objectif</span>
                <input type="number" id="targetInput" class="num-input" value="100" min="10" step="10">
              </div>
              <div class="setup-row">
                <span class="setup-label">Temps / tour</span>
                <div class="seg" id="timeSeg">
                  <button data-s="15">15s</button>
                  <button data-s="20" class="on">20s</button>
                  <button data-s="30">30s</button>
                  <button data-s="45">45s</button>
                </div>
              </div>
              <button class="btn btn-primary btn-block" id="startBtn">Lancer la partie</button>
              <p class="setup-err" id="startErr"></p>
            </div>

            <p class="wait-note" id="waitNote" hidden>En attente que l'hôte lance la partie…</p>
          </div>
        </div>
      </div>
    </section>

    <!-- JEU : plein écran, sans scroll (plateau redimensionné pour rentrer) -->
    <section id="game" hidden>
      <div class="scoreboard" id="scorePanel"></div>
      <div class="board-area" id="boardArea">
        <div class="frame" id="frame"></div>
      </div>
      <div class="game-bottom" id="gameBottom">
        <div class="river-lbl">Rivière</div>
        <div class="river" id="river"></div>
        <div class="status" id="status"></div>
        <button class="btn btn-primary" id="endTurn" style="display:none">Terminer le tour</button>
        <button class="btn btn-ghost" id="endGameBtn" hidden>Terminer la partie</button>
      </div>
    </section>

    <!-- FIN -->
    <section id="finished" hidden>
      <div class="setup-card">
        <h2 id="winTitle"></h2>
        <div class="players" id="ranking"></div>
        <button class="btn btn-primary" id="lobbyBtn" style="width:100%" hidden>Retour au salon</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <a href="regles.html">Règles du jeu</a>
    <span class="footer-sep">·</span>
    <a href="../mentions.html">Mentions légales</a>
    <span class="footer-sep">·</span>
    <a href="https://www.twitch.tv/prof_de_tweener" target="_blank" rel="noopener">🟣 Twitch</a>
    <span class="footer-sep">·</span>
    <a href="https://buymeacoffee.com/profdetweener" target="_blank" rel="noopener">☕ Soutenir</a>
  </footer>

  <script type="module" src="js/room.js?v=7"></script>
</body>
</html>
