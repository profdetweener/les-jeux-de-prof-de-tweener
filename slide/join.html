<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2540">
  <title>Slide compétitif</title>
  <link rel="stylesheet" href="../shared/css/landing.css">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <header class="landing-header">
    <a href="index.html" class="app-header-home" title="Retour au choix du mode">←</a>
    <h1>Slide compétitif</h1>
    <span class="header-tagline">plateau partagé, chacun son tour</span>
  </header>

  <main class="slide-main">
    <div class="setup-card">
      <h2>Rejoindre une partie</h2>
      <label class="setup-field">
        <span class="setup-label">Ton pseudo</span>
        <input id="pseudo" type="text" maxlength="20" placeholder="Max" autocomplete="off">
      </label>

      <button class="btn btn-primary" id="createBtn" style="width:100%;margin-top:6px">Créer une partie</button>

      <div class="setup-or">ou rejoindre avec un code</div>

      <label class="setup-field">
        <span class="setup-label">Code de la partie</span>
        <input id="code" type="text" maxlength="6" placeholder="ABC123" autocomplete="off" style="text-transform:uppercase">
      </label>
      <button class="btn btn-ghost" id="joinBtn" style="width:100%">Rejoindre</button>

      <p class="setup-err" id="err"></p>
    </div>
  </main>

  <footer class="app-footer">
    <a href="regles.html">Règles du jeu</a>
    <span class="footer-sep">·</span>
    <a href="../petitbac/mentions.html">Mentions légales</a>
    <span class="footer-sep">·</span>
    <a href="https://www.twitch.tv/prof_de_tweener" target="_blank" rel="noopener">🟣 Twitch</a>
    <span class="footer-sep">·</span>
    <a href="https://buymeacoffee.com/profdetweener" target="_blank" rel="noopener">☕ Soutenir</a>
  </footer>

  <script type="module" src="js/join.js"></script>
</body>
</html>
